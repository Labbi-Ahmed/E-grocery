name: e_grocery
description: "Labbi African Market - E-Commerce App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  smooth_page_indicator: ^1.2.0+3
  flutter_rating_bar: ^4.0.1
  pin_code_fields: ^8.0.1
  google_maps_flutter: ^2.14.13
  image_picker: ^1.1.2
  lottie: ^3.3.1

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.2
  json_annotation: ^4.9.0
  pretty_dio_logger: ^1.4.0

  # DI
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Functional
  dartz: ^0.10.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  retrofit_generator: ^9.1.8
  injectable_generator: ^2.7.0
  freezed: ^3.0.6
  freezed_annotation: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
